
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GATE & TCS NQT - Counting Theory and Probability Test</title>
<style>
body{font-family:Arial;max-width:1000px;margin:auto;padding:20px}
.q{border:1px solid #ccc;padding:12px;margin:12px 0;border-radius:8px}
button{padding:10px 20px;font-size:16px}
#res{font-size:22px;font-weight:bold;margin-top:20px}
</style>
</head>
<body>
<h1>Counting Theory & Probability Assessment</h1>
<p>20 Questions | Based on GATE, TCS NQT, Placement Aptitude Patterns</p>
<form id="quiz"></form>
<button onclick="submitTest();return false;">Submit Test</button>
<div id="res"></div>

<script>
const q=[
["[TCS NQT] How many 4-digit numbers can be formed using digits 1,2,3,4,5 without repetition?",["60","120","240","625"],1],
["[GATE] A fair coin is tossed 3 times. Probability of exactly 2 heads?",["1/8","3/8","1/2","5/8"],1],
["[TCS NQT] In how many ways can 5 students sit in a row?",["60","120","24","25"],1],
["[GATE] Two dice are rolled. Probability that sum equals 7?",["1/6","5/36","7/36","1/12"],0],
["[TCS NQT] How many arrangements of APPLE are possible?",["120","60","30","240"],1],
["[GATE] From a deck of cards, probability of drawing a king?",["1/13","1/4","4/13","1/52"],0],
["[TCS NQT] Four letters posted into six post boxes. Ways?",["6^4","24","720","1296"],3],
["[GATE] Probability of getting at least one head in two tosses?",["1/4","1/2","3/4","1"],2],
["[TCS NQT] Captain and vice-captain from 8 students?",["28","56","64","40"],1],
["[GATE] Number of ways to choose 3 from 8 people?",["56","24","336","120"],0],
["[TCS NQT] Even 4-digit PINs with repetition allowed?",["2500","5000","10000","4500"],1],
["[GATE] A bag has 5 red and 3 blue balls. Probability of red?",["3/8","5/8","1/2","5/3"],1],
["[TCS NQT] Using digits 0,1,2,3,4,5 form 4-digit numbers without repetition.",["300","360","240","120"],0],
["[GATE] Probability both dice show even numbers?",["1/4","1/3","1/2","1/6"],0],
["[TCS NQT] Arrangements of BANANA?",["60","120","30","90"],0],
["[GATE] Out of two-digit numbers, probability not divisible by 7?",["77/90","13/90","1/7","7/90"],0],
["[TCS NQT] Minimum balls needed to guarantee same colour from 6 colours?",["5","6","7","8"],2],
["[GATE] Reliability problem: X supplies 60% with reliability 96%, Y supplies 40% with reliability 72%. P(reliable came from Y)?",["0.333","0.4","0.25","0.5"],0],
["[TCS NQT] How many ways can letters of MATH be arranged?",["12","16","20","24"],3],
["[GATE] Ram selection=1/6, Ramesh=1/8. Probability exactly one selected?",["1/4","5/24","1/3","1/2"],0]
];

const form=document.getElementById('quiz');
q.forEach((x,i)=>{
 let d=document.createElement('div');
 d.className='q';
 let h=`<b>Q${i+1}. ${x[0]}</b><br><br>`;
 x[1].forEach((o,j)=>{
  h+=`<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`;
 });
 d.innerHTML=h;
 form.appendChild(d);
});

function submitTest(){
 let s=0;
 q.forEach((x,i)=>{
  let a=document.querySelector(`input[name=q${i}]:checked`);
  if(a && Number(a.value)===x[2]) s++;
 });
 document.getElementById('res').innerHTML=`Your Score: ${s}/20`;
}
</script>
</body>
</html>
